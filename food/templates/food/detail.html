{% extends 'food/base.html' %}

{% block body %}

<div class="container mt-5">

    <div class="card shadow-lg border-0 rounded-4 p-4">

        <div class="row g-4">

            <!-- Food Image -->
            <div class="col-md-5 text-center">

                <img src="{{ food_details.image }}"
                     class="img-fluid rounded-4 shadow"
                     style="width:100%;
                            max-height:450px;
                            object-fit:cover;">

            </div>

            <!-- Food Details -->
            <div class="col-md-7">

                <h1 class="fw-bold text-dark">
                    {{ food_details.dish }}
                </h1>

                <hr>

                <span class="badge bg-success fs-6 mb-3">
                    ₹ {{ food_details.price }}
                </span>

                <h4 class="text-secondary mt-3">
                    Description
                </h4>

                <p class="lead">
                    {{ food_details.description }}
                </p>

                <div class="mt-4">
                    <h6 class="text-muted">
                        Posted by
                    </h6>

                    <span class="badge bg-primary p-2">
                        {{ food_details.user_name }}
                    </span>
                </div>

                <!-- Buttons -->
                <div class="mt-5">

                    <a href="{% url 'food:update_food' food_details.id %}"
                       class="btn btn-warning me-3 px-4">
                        ✏️ Update
                    </a>

                    <a href="{% url 'food:delete_food' food_details.id %}"
                       class="btn btn-danger px-4">
                        🗑 Delete
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
