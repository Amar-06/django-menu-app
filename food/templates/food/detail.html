{% extends 'food/base.html' %}

{% block body %}

<br><br><br>

<div class="container">

    <div class="row">

        <div class="col-md-6">

            <img src="{{ food_details.image }}"
                 class="card"
                 style="width:400px;
                        height:400px;
                        object-fit:cover;">

        </div>

        <div class="col-md-6">

            <h1>{{ food_details.dish }}</h1>

            

            <br><br>

            <h3>
                Dish Description:
                <br><br>
                {{ food_details.description }}
            </h3>

            <h4>$ {{ food_details.price }}</h4>

            <h5>posted by : {{food_details.user_name}} </h5>

        </div>

        <div class="col-md-6">

            <br><br>

            <a href="{% url 'food:update_food' food_details.id %}"
               class="btn btn-success">
               Update
            </a>

            <a href="{% url 'food:delete_food' food_details.id %}"
               class="btn btn-danger">
               Delete
            </a>

        </div>

    </div>

</div>

{% endblock %}
