{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food List</title>
    <link rel="stylesheet" href="{% static 'food/style.css' %}">
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="#">FoodApp</a>

        <div class="ms-auto">
            <a class="btn text-primary" href="#">Add Item</a>
            <a class="btn text-primary" href="#">Delete Item</a>
            <a class="btn text-primary" href="#">View Item</a>
        </div>

    </div>
</nav>
    <h1 style="color: black;">Our Menu</h1>
    <h2 style="color: red;">Dishes               Price</h2>
    {%for i in Food_List%}
        <ul>
            <li><a href="{%url 'food:Food_details' i.dish%}">{{i.dish}} </a>------------- {{i.price}} </li>
            
       
        </ul>
    {%endfor%}
    
</body>
</html>
